<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Video Controls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0f0f0f;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }

    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shortcut-row span {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .kbd-group {
      display: flex;
      gap: 4px;
    }

    kbd {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      padding: 2px 7px;
      color: #fff;
    }

    .tip {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.25);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
    }

    .tip strong {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">▶</div>
    <h1>
      Instagram Video Controls
      <span>Extensão ativa no Instagram</span>
    </h1>
  </header>

  <p class="section-title">Atalhos de teclado</p>
  <div class="shortcut-list">
    <div class="shortcut-row">
      <span>▶ Play / Pause</span>
      <div class="kbd-group"><kbd>Espaço</kbd></div>
    </div>
    <div class="shortcut-row">
      <span>⏪ Voltar 5s</span>
      <div class="kbd-group"><kbd>←</kbd></div>
    </div>
    <div class="shortcut-row">
      <span>⏩ Avançar 5s</span>
      <div class="kbd-group"><kbd>→</kbd></div>
    </div>
    <div class="shortcut-row">
      <span>🔇 Mudo</span>
      <div class="kbd-group"><kbd>M</kbd></div>
    </div>
    <div class="shortcut-row">
      <span>⛶ Tela cheia</span>
      <div class="kbd-group"><kbd>F</kbd></div>
    </div>
  </div>

  <p class="section-title">Como usar</p>
  <div class="tip">
    Passe o <strong>mouse sobre um vídeo</strong> no Instagram para exibir os controles. Use os botões na barra inferior ou os atalhos do teclado.
  </div>
</body>
</html>
